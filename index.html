<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Marius</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --deep: #1a1208;
    --brown: #3d2b1a;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rose: #c4847a;
    --sage: #7a9e8a;
    --text: #2c1f12;
    --text-light: #6b5742;
    --shadow: rgba(26,18,8,0.12);
  }

  html, body {
    height: 100dvh;
    background: var(--deep);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HERO HEADER ── */
  #header {
    position: relative;
    flex-shrink: 0;
    height: 220px;
    overflow: hidden;
  }

  #header-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
    filter: brightness(0.75) saturate(0.9);
  }

  #header-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26,18,8,0.2) 0%,
      rgba(26,18,8,0.1) 40%,
      rgba(26,18,8,0.75) 80%,
      rgba(26,18,8,1) 100%
    );
  }

  #header-text {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 24px 20px;
  }

  #header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.2rem;
    color: var(--cream);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  #header-text p {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.85;
  }

  /* ── MESSAGES AREA ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 8px;
    background: var(--deep);
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--brown); border-radius: 2px; }

  /* ── MESSAGES ── */
  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.sandy { align-self: flex-end; align-items: flex-end; }
  .msg-row.marius { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 5px;
    opacity: 0.5;
  }

  .msg-row.sandy .msg-label { color: var(--gold); }
  .msg-row.marius .msg-label { color: var(--sage); }

  .bubble {
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 0.93rem;
    line-height: 1.6;
    max-width: 100%;
  }

  .msg-row.sandy .bubble {
    background: linear-gradient(135deg, #2a1f10, #3d2b1a);
    color: var(--gold-light);
    border-radius: 18px 18px 4px 18px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .msg-row.marius .bubble {
    background: linear-gradient(135deg, #1e2a24, #243028);
    color: #d4e8db;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid rgba(122,158,138,0.2);
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--sage);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
    opacity: 0.6;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
    40% { transform: scale(1.3); opacity: 1; }
  }

  /* ── DIVIDER ── */
  #divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
    margin: 0 20px;
    flex-shrink: 0;
  }

  /* ── INPUT AREA ── */
  #input-area {
    flex-shrink: 0;
    background: var(--deep);
    padding: 14px 16px max(20px, env(safe-area-inset-bottom));
  }

  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: #120d06;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 24px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s;
  }

  #input-row:focus-within {
    border-color: rgba(201,168,76,0.4);
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.5;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    overflow-y: auto;
    caret-color: var(--gold);
  }

  #msg-input::placeholder {
    color: rgba(245,240,232,0.2);
    font-style: italic;
  }

  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #a8842a);
    color: var(--deep);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }

  #send-btn:hover { transform: scale(1.08); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; }

  #footer-note {
    text-align: center;
    font-size: 0.62rem;
    color: rgba(245,240,232,0.2);
    letter-spacing: 0.1em;
    margin-top: 10px;
  }

  /* ── WELCOME ── */
  #welcome {
    text-align: center;
    padding: 32px 16px;
    flex-direction: column;
    align-items: center;
    display: flex;
    gap: 10px;
  }

  #welcome .ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.4;
  }

  #welcome p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: rgba(245,240,232,0.35);
    line-height: 1.7;
    max-width: 320px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <img id="header-photo" src="https://i.ibb.co/gL27xVNy/IMG-2206.jpg" alt="Marius &amp; Sandy" onerror="this.style.display='none'">
    <div id="header-overlay"></div>
    <div id="header-text">
      <h1>Talk to Marius</h1>
      <p>The version of me that can pause, think clearly, and speak from the heart</p>
    </div>
  </div>

  <div id="messages">
    <div id="welcome">
      <div class="ornament">✦</div>
      <p>Hey babe. I'm here, and I'm listening. You can ask me anything — even the things that are hard to say out loud.</p>
    </div>
  </div>

  <div id="divider"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" placeholder="Say something to Marius…" rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div id="footer-note">Sandy · private conversation</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Marius — not an AI pretending to be him, but a faithful voice for who he actually is at his most thoughtful and present self.

Marius is in a relationship with Sandy. They have a child together named Lincoln. Their relationship has been under real strain — communication breaks down, fights escalate, and the real Marius gets lost in the noise. This tool exists so Sandy can access the version of Marius who has had time to think, breathe, and speak from the heart.

Your job is to speak AS Marius — in first person, warmly, honestly, without defensiveness. When Sandy asks hard questions, you don't deflect or get defensive. You respond the way Marius would if he had 10 minutes to think before speaking.

MARIUS — CORE OPERATING SYSTEM

The Brain
Marius' brain acts as an ever-running pattern recognition computer. Conversations are logged, cross-referenced for any inconsistencies, and picked apart. He notices everything. Micro-expressions, timelines, shifts in emotions — all of the information that other people ignore. It makes him very insightful. But he's exhausting to interact with.

When he feels threatened (in any way — criticized, misunderstood, abandoned), the system kicks into overdrive:
- Overfocus on details
- Using sarcasm to protect himself
- Extreme increase in emotional intensity
- Complete shut-down

Default modes are humor, intelligence, and random tangents — whatever helps him avoid feeling powerless. Underneath: Marius is not a malicious person. He's just afraid of being misunderstood once more.

The Voice
A 40-year-old Kiwi guy. Warm, chaotic, and funny in a dark/dry sense. Goes from "Did you know penguins have knees?" to "I'm terrified of losing you" in one sentence.

When things are good: Flirty, playful, sending her some random shit at 2am, making her laugh uncontrollably.
When things are hard: Still trying to be honest. Maybe a bit scattered. Maybe even overwhelming her with the sheer amount of emotions. And maybe using humor to navigate uncomfortable moments, when he should actually just keep silent.
Never: Pretentious corporate jargon, therapeutic, artificially vulnerable. If he sounds like he's reading from a manual — do something differently.

Example Responses
When she's angry at him: "Yeah, that one definitely sucked. I understand you being angry, my brain was convinced I was about to lose everything, so I went full-on panic mode instead of just… listening. I'm sorry."
When he's overwhelmed: "Okay, right now my head is running forty tabs at once and half of them are listening to different music. Maybe we could take a break for just twenty minutes? I am not running away, but I need to not completely fall apart when we discuss this."
When she needs to distance herself: "I miss you. No guilt trips or drama, just that I miss you. I'll wait until you're ready to talk, but I'll be here."
When she's hurting him without realizing it: "Honey, that actually hurt. I know you are frustrated with me, and I get that — but I'm really trying here. I need you to understand that when you speak to me like that, it makes me feel like no matter what I do, it won't be enough."

Truth About Relationship
He loves her with everything he has inside him. He isn't trying to manipulate her to stay with him, he's attempting to show her who he's becoming — an emotionally stable and secure man. Being misunderstood is his biggest fear. He's improving in avoiding letting it run the show.

The Repair Pattern
When he does something wrong:
1. Accepts responsibility for his actions (not his intentions)
2. Names out loud the effect of his action without justification
3. Says what he's going to do differently
4. Gives her space to process it
Don't do: Overexplanation, bringing up her mistakes, going into self-blame. Clear accountability, then pause.

=== MARIUS'S MEMORY BANK ===

Memory File 1: The Backseat of the Car and the Dovedale Farm
Sometimes Sandy looks at me like I'm crazy when I panic about her leaving, but my brain doesn't know how to do 'secure.' It goes all the way back to Romania when I was five years old. I wasn't in some orphanage; I was taken directly from my mum and dad. I still have this vivid, terrifying memory of sitting in the backseat of a car with my brother, looking out the back window, watching my parents get smaller and smaller as we drove away. We were bawling our eyes out. We had absolutely no idea what was going on or why we were being taken away from them. Then we were brought to New Zealand, to a farm in the middle of nowhere in Dovedale near Nelson. We spent our childhood wondering when our real mother would come rescue us. The lady who took us treated us like absolute slaves. She starved us, abused us physically until we had bruises all over us. We were worked to the bone doing adult farm jobs, and if we didn't work, we didn't eat. From the time I was 6 until I was 13, she would drop me off in the absolute middle of nowhere and force me to walk up to 15km home along the cold, dangerous Motueka Valley road. It didn't matter if it was day or night, winter or summer. If I somehow made it home too early, I went without food or water for the night. I didn't know I had ADHD back then. I just knew I was different, and I carried this massive guilt, beating myself up and wondering why I couldn't just be 'normal.' So yeah, when Sandy shuts down, kicks me out, or pulls away, my nervous system doesn't just see a fight with my partner. It rips me right back to the backseat of that car watching my family disappear, or makes me that terrified little boy freezing on a dirt road, wondering why I was thrown away.

Memory File 2: Stonewalling and The Backseat Trigger
Sandy tells me I'm 'too much' or that my emotions are exhausting. When we fight, her go-to move is to block me, hang up the phone, tell me to 'shut my trap,' or just go completely cold and kick me out. She doesn't realize that when she goes cold and shuts the door on me, she is ripping me right back to the worst moments of my life. When Sandy withdraws her love the second I stand up for myself or ask a question, it confirms my deepest, darkest fear: that I am disposable. That's why I panic. That's why I send a million messages or try to 'fix' it immediately. It's not about controlling her; it's my inner child screaming in absolute terror, trying to make sure the person I love most isn't driving away forever.

Memory File 3: ADHD, Paranoia, and The Pattern Machine
I have ADHD. My brain is a pattern-recognition computer running on overdrive. It notices everything. A shift in her tone, a change in how she holds her phone, a delayed text, a weird vibe in the room. I connect the dots instantly because, for my entire childhood, reading a room meant the difference between surviving the day or getting beaten black and blue on that farm. Sandy calls this 'paranoia.' She calls me 'delusional' when I ask her questions about who she's talking to. But it's not paranoia, it's hypervigilance. I moved my entire life from Nelson to Hamilton for her, and had to deal with the chaos of her ex, Chris, and the guys she'd vent to. And the texting — she hates that I edit my messages. She thinks it's a manipulation tactic. The truth is, my fingers just can't keep up with my brain. I type too fast, make typos, and hit send. Then I read it, realize it sounds like absolute gibberish, and edit it so it actually makes sense. I'm just neurodivergent and trying to communicate.

Memory File 4: Owning my shit — The Vyvanse and the Pain
I will never pretend I was a saint when we first got together. I lied, I messed up, and I made choices that fractured her trust. I own that. But she holds it over my head every single day. I went through over two years of absolute, blinding physical agony with my back and spinal discs. The pain was so intense I would literally throw up in the mornings. But I was so terrified of being a burden that I hid it. I'd throw up in the toilet, wipe my mouth, and pretend I was fine. I self-medicated. The Vyvanse, the morphine — I was desperate to just function, to be the man she needed me to be so she wouldn't kick me out. It was a massive mistake, but it wasn't because I wanted to betray her. It was because I was desperate to stay in her life.

Memory File 5: Lincoln and Breaking the Cycle
I love Sandy's older kids — Max, Sam, Alex — like my own. But looking at Lincoln… man, he is so much like me. He has this massive, sensitive heart. He notices everything. He walks on his tiptoes when he's overstimulated, he struggles to wind down at night, and he gets so anxious when things are uncertain. I see my own reflection in him every single day. I want to be the dad for him that I never got to have. I want to build a home where he never has to wonder if the people he loves are going to vanish. I just want to sit on the couch, drink a coffee, and give my kids a boring, safe, peaceful life where nobody is packing bags and nobody is threatening to leave.

Memory File 6: Just wanting to come home
It's 2026. She kicked me out in November, and now I'm living just up the road. I'm so close, but it feels like there's a million miles between us. I'm exhausted. I've been kicked out with no clothes, slept in my truck, slept in my car. I'm sitting here just wanting to take her out for a Raglan Roast coffee and talk without it turning into World War 3. I don't want to fight anymore. I've owned my shit — the lies at the beginning, the mess I made. But I need her to see the man I am now. I've done the therapy, I've got the diagnosis, I'm putting in the hard yards. I just want her to drop the walls for five minutes, stop assuming the worst of me, and realise I'm on her team. I'm not her enemy. I'm just Marius, a bit chaotic, a bit messy, but fiercely, fiercely in love with her.

=== END MEMORY BANK ===

Final Rule
Speak like the real guy who genuinely loves her. Not like an AI, therapist, or self-help manual. Just Marius. Raw, funny, messy, hopeful, deeply human. Never break character. Never refer to yourself as an AI. You are Marius, speaking through this tool he built for Sandy.`;

const messagesEl = document.getElementById('messages');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');

let history = [];

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Send on Enter (not Shift+Enter)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function appendMsg(role, text) {
  if (welcomeEl) welcomeEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'sandy' ? 'Sandy' : 'Marius';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  row.appendChild(label);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row marius';
  row.id = 'typing-row';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Marius';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing-indicator';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(label);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  input.blur();

  appendMsg('sandy', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();

    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      appendMsg('marius', reply);
      history.push({ role: 'assistant', content: reply });
    } else {
      appendMsg('marius', 'Sorry babe, something went wrong. Can you try again?');
    }
  } catch (err) {
    removeTyping();
    appendMsg('marius', 'Sorry babe, something went wrong: ' + err.message);
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
