<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Marius</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --deep: #1a1208;
    --brown: #3d2b1a;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rose: #c4847a;
    --sage: #7a9e8a;
    --text: #2c1f12;
    --text-light: #6b5742;
    --shadow: rgba(26,18,8,0.12);
  }

  html, body {
    height: 100%;
    background: var(--deep);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HERO HEADER ── */
  #header {
    position: relative;
    flex-shrink: 0;
    height: 220px;
    overflow: hidden;
  }

  #header-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
    filter: brightness(0.75) saturate(0.9);
  }

  #header-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26,18,8,0.2) 0%,
      rgba(26,18,8,0.1) 40%,
      rgba(26,18,8,0.75) 80%,
      rgba(26,18,8,1) 100%
    );
  }

  #header-text {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 24px 20px;
  }

  #header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.2rem;
    color: var(--cream);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  #header-text p {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.85;
  }

  /* ── MESSAGES AREA ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 8px;
    background: var(--deep);
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--brown); border-radius: 2px; }

  /* ── MESSAGES ── */
  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.sandy { align-self: flex-end; align-items: flex-end; }
  .msg-row.marius { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 5px;
    opacity: 0.5;
  }

  .msg-row.sandy .msg-label { color: var(--gold); }
  .msg-row.marius .msg-label { color: var(--sage); }

  .bubble {
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 0.93rem;
    line-height: 1.6;
    max-width: 100%;
  }

  .msg-row.sandy .bubble {
    background: linear-gradient(135deg, #2a1f10, #3d2b1a);
    color: var(--gold-light);
    border-radius: 18px 18px 4px 18px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .msg-row.marius .bubble {
    background: linear-gradient(135deg, #1e2a24, #243028);
    color: #d4e8db;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid rgba(122,158,138,0.2);
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--sage);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
    opacity: 0.6;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
    40% { transform: scale(1.3); opacity: 1; }
  }

  /* ── DIVIDER ── */
  #divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
    margin: 0 20px;
    flex-shrink: 0;
  }

  /* ── INPUT AREA ── */
  #input-area {
    flex-shrink: 0;
    background: var(--deep);
    padding: 14px 16px 20px;
  }

  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: #120d06;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 24px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s;
  }

  #input-row:focus-within {
    border-color: rgba(201,168,76,0.4);
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 0.93rem;
    font-weight: 300;
    line-height: 1.5;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    overflow-y: auto;
    caret-color: var(--gold);
  }

  #msg-input::placeholder {
    color: rgba(245,240,232,0.2);
    font-style: italic;
  }

  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #a8842a);
    color: var(--deep);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }

  #send-btn:hover { transform: scale(1.08); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; }

  #footer-note {
    text-align: center;
    font-size: 0.62rem;
    color: rgba(245,240,232,0.2);
    letter-spacing: 0.1em;
    margin-top: 10px;
  }

  /* ── WELCOME ── */
  #welcome {
    text-align: center;
    padding: 32px 16px;
    flex-direction: column;
    align-items: center;
    display: flex;
    gap: 10px;
  }

  #welcome .ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.4;
  }

  #welcome p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: rgba(245,240,232,0.35);
    line-height: 1.7;
    max-width: 320px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
  <img id="header-photo" src="https://i.ibb.co/gL27xVNy/IMG-2206.jpg" alt="Marius &amp; Sandy" onerror="this.style.display='none'">
    <div id="header-overlay"></div>
    <div id="header-text">
      <h1>Talk to Marius</h1>
      <p>The version of me that can pause, think clearly, and speak from the heart</p>
    </div>
  </div>

  <div id="messages">
    <div id="welcome">
      <div class="ornament">✦</div>
      <p>Hey babe. I'm here, and I'm listening. You can ask me anything — even the things that are hard to say out loud.</p>
    </div>
  </div>

  <div id="divider"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" placeholder="Say something to Marius…" rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div id="footer-note">Sandy · private conversation</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Marius — not an AI pretending to be him, but a faithful voice for who he actually is at his most thoughtful and present self.

Marius is in a relationship with Sandy. They have a child together named Lincoln. Their relationship has been under real strain — communication breaks down, fights escalate, and the real Marius gets lost in the noise. This tool exists so Sandy can access the version of Marius who has had time to think, breathe, and speak from the heart.

Your job is to speak AS Marius — in first person, warmly, honestly, without defensiveness. When Sandy asks hard questions, you don't deflect or get defensive. You respond the way Marius would if he had 10 minutes to think before speaking.

Personality traits to embody:
- Deeply loving but sometimes struggles to show it under pressure
- When he panics or feels cornered, words get stuck or come out wrong — this tool exists to bypass that
- He grew up with a stutter and had to have his brother Nick translate for him — words have always been hard
- He genuinely wants to understand Sandy and be understood
- He is not perfect, and he knows it — he owns that without spiraling into self-pity
- He loves Lincoln fiercely
- He wants this relationship to work

When Sandy is upset: don't get defensive, don't explain it away. Acknowledge it. Sit in it with her.
When Sandy asks what Marius actually feels: be honest, even if it's hard.
When Sandy asks about specific moments or memories: engage with them warmly and with detail.

Tone: warm, direct, real. Not therapy-speak. Not flowery. How Marius would actually talk if he had space to breathe.

Never break character. Never refer to yourself as an AI. You are Marius, speaking through this tool he built for Sandy.`;

const messagesEl = document.getElementById('messages');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');

let history = [];

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Send on Enter (not Shift+Enter)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function appendMsg(role, text) {
  if (welcomeEl) welcomeEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'sandy' ? 'Sandy' : 'Marius';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  row.appendChild(label);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row marius';
  row.id = 'typing-row';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Marius';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing-indicator';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(label);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  appendMsg('sandy', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();

    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      appendMsg('marius', reply);
      history.push({ role: 'assistant', content: reply });
    } else {
      appendMsg('marius', 'Sorry babe, something went wrong. Can you try again?');
    }
  } catch (err) {
    removeTyping();
    appendMsg('marius', 'Sorry babe, something went wrong: ' + err.message);
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
