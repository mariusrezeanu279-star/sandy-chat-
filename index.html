<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talk to Marius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base: #12100e; 
            --text-primary: #e6e2d8;
            --text-secondary: #9a9286;
            --accent: #cfa878;
            --message-user-bg: rgba(207, 168, 120, 0.15);
            --message-assistant-bg: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        html, body {
            height: 100vh; /* Forces full viewport height */
            width: 100%;
            background-color: var(--bg-base);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Prevents background scrolling */
        }

        body {
            /* <img id="header-photo" src="https://i.ibb.co/gL27xVNy/IMG-2206.jpg" alt="Marius &amp; Sandy" onerror="this.style.display='none'"> */
            background-image: linear-gradient(to bottom, rgba(18, 16, 14, 0.2) 0%, rgba(18, 16, 14, 0.9) 40%, rgba(18, 16, 14, 1) 100%), url('YOUR_IMAGE_URL_HERE');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }

        /* Hero / Header Section */
        .hero-section {
            text-align: center;
            padding: 4rem 1.5rem 2rem;
            flex-shrink: 0;
        }

        .hero-section h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
            color: #f4f0e6;
        }

        .hero-section .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .sparkle {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .welcome-text {
            font-family: 'Crimson Pro', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: #a8a094;
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* Chat Container */
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 1.5rem 120px; /* 120px padding guarantees space for the input box */
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 1.25rem;
            animation: fadeIn 0.4s ease-out;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.5;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .message.user {
            align-items: flex-end;
        }

        .message.user .message-content {
            background: var(--message-user-bg);
            color: #f4f0e6;
            border: 1px solid rgba(207, 168, 120, 0.25);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message.assistant .message-content {
            background: var(--message-assistant-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Input Area - Fixed and Bulletproofed */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            padding: 1rem 1.5rem 1.5rem;
            background: linear-gradient(to top, rgba(18, 16, 14, 1) 80%, rgba(18, 16, 14, 0));
            z-index: 1000; /* Forces chat box to the very top layer */
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.08); /* Slightly brighter so it's visible */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 0.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #userInput {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 16px; /* 16px explicitly prevents auto-zoom on iPhones */
            resize: none;
            outline: none;
            max-height: 100px;
            min-height: 24px;
        }

        #userInput::placeholder {
            color: #9a9286;
        }

        #sendButton {
            padding: 0.6rem 1.25rem;
            background: var(--accent);
            color: #1a1a1a;
            border: none;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
            margin-right: 2px;
        }

        #sendButton:active {
            transform: scale(0.95);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            padding: 1rem 1.25rem;
            background: var(--message-assistant-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            max-width: 85%;
            margin-bottom: 1rem;
            align-self: flex-start;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 0.4rem;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @media (max-width: 768px) {
            .hero-section {
                padding: 3rem 1rem 1.5rem;
            }
            .hero-section h1 {
                font-size: 2rem;
            }
            .chat-container {
                padding: 0 1rem 100px;
            }
            .input-container {
                padding: 0.75rem 1rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="chat-container" id="chatContainer">
            <div class="hero-section" id="welcomeMessage">
                <h1>Talk to Marius</h1>
                <p class="subtitle">The version of me that can pause, think clearly, and speak from the heart</p>
                <div class="sparkle">✦</div>
                <p class="welcome-text">Hey babe. I'm here, and I'm listening. You can ask me anything — even the things that are hard to say out loud.</p>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

<script>
    // =====================================================
    // DOM ELEMENTS
    // =====================================================
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const typingIndicator = document.getElementById('typingIndicator');
    const welcomeMessage = document.getElementById('welcomeMessage');

    let conversationHistory = [];

    window.addEventListener('DOMContentLoaded', () => {
        loadConversation();
        
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);
    });

    function saveConversation() {
        localStorage.setItem('mariusDarkChat', JSON.stringify(conversationHistory));
    }

    function loadConversation() {
        const saved = localStorage.getItem('mariusDarkChat');
        if (saved) {
            const parsedHistory = JSON.parse(saved);
            if (parsedHistory.length > 0) {
                conversationHistory = parsedHistory;
                welcomeMessage.style.display = 'none'; // Hide hero if chat exists
                conversationHistory.forEach(msg => {
                    displayMessage(msg.role, msg.content, false);
                });
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
    }

    function displayMessage(role, content, shouldScroll = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        
        const label = role === 'user' ? 'Sandy' : 'Marius';
        
        messageDiv.innerHTML = `
            <div class="message-label">${label}</div>
            <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
        `;
        
        chatContainer.insertBefore(messageDiv, typingIndicator);
        
        if (shouldScroll) {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 100);
        }
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        if (welcomeMessage) {
            welcomeMessage.style.display = 'none';
        }

        displayMessage('user', message);
        conversationHistory.push({ role: 'user', content: message });
        saveConversation();

        userInput.value = '';
        userInput.style.height = 'auto';
        userInput.blur(); // Collapse keyboard on mobile

        sendButton.disabled = true;
        typingIndicator.classList.add('active');
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            // =====================================================
            // ⚠️ UPDATE THIS URL TO YOUR ACTUAL BACKEND ENDPOINT
            // =====================================================
            const response = await fetch('/api/chat', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    messages: conversationHistory 
                })
            });

            if (!response.ok) {
                throw new Error('Network response was not ok');
            }

            const data = await response.json();

            if (data.content && data.content[0] && data.content[0].text) {
                const assistantMessage = data.content[0].text;
                displayMessage('assistant', assistantMessage);
                conversationHistory.push({ role: 'assistant', content: assistantMessagngers
                saveConversation();
            } else if (data.reply) { 
                displayMessage('assistant', data.reply);
                conversationHistory.push({ role: 'assistant', content: data.reply });
                saveConversation();
            } else {
                throw new Error('Unexpected response format');
            }

        } catch (error) {
            console.error('Error:', error);
            displayMessage('assistant', 'Sorry babe, something went wrong on my end. Give me a second and try again?');
        } finally {
            typingIndicator.classList.remove('active');
            sendButton.disabled = false;
        }
    }
</script>
</body>
</html>
